name: Deploy Zuvaro Website

on:
  push:
    branches: [main]
    paths:
      - 'zuvaro-website-source/**'
      - '.github/workflows/zuvaro-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: zuvaro-website-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: zuvaro-website-source
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zuvaro-website-source/package-lock.json
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: zuvaro-website-source/dist
      - id: deployment
        uses: actions/deploy-pages@v4
