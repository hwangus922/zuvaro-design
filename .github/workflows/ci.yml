name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zuvaro-website-source
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zuvaro-website-source/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  root-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run bundle:all
      - run: git diff --exit-code
