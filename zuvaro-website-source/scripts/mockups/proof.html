<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 390px; height: 844px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
    background: #fff; color: #0A0A0F;
  }
  .status { display:flex; justify-content:space-between; padding:14px 24px 0; font-size:15px; font-weight:600; }
  .island { width:120px; height:34px; background:#000; border-radius:20px; margin:8px auto 0; }
  .header { display:flex; align-items:center; gap:12px; padding:16px 24px 0; }
  .back { width:36px; height:36px; border-radius:50%; background:#F4F3F8; display:grid; place-items:center; font-size:16px; }
  .header h1 { font-size:16px; font-weight:700; }
  .content { padding: 20px 24px 0; }
  .dare { font-size:24px; font-weight:700; line-height:1.2; margin-bottom:8px; }
  .hint { font-size:14px; color:rgba(0,0,0,.62); margin-bottom:16px; }
  .upload {
    height:180px; border-radius:20px; border:1px dashed rgba(0,0,0,.14);
    background:#F4F3F8; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    overflow:hidden; position:relative;
  }
  .upload img { width:100%; height:100%; object-fit:cover; }
  .upload .emoji { font-size:40px; }
  .upload .label { font-size:15px; font-weight:600; }
  .field {
    margin-top:12px; padding:14px; border-radius:12px; background:#F4F3F8;
    font-size:14px; color:rgba(0,0,0,.38);
  }
  .rules {
    margin-top:12px; padding:14px; border-radius:16px; background:#F4F3F8;
    font-size:13px; line-height:1.5; color:rgba(0,0,0,.62);
  }
  .btn {
    margin-top:16px; height:48px; border-radius:99px; display:grid; place-items:center;
    background:linear-gradient(135deg,#FF6A2C,#FF2D87,#C81E5B);
    color:#170006; font-size:16px; font-weight:700;
  }
</style>
</head>
<body>
  <div class="status"><span>9:41</span><span>●●● ▮▮▮ 🔋</span></div>
  <div class="island"></div>
  <div class="header"><div class="back">‹</div><h1>Submit proof</h1></div>
  <div class="content">
    <div class="dare">Let yo bih go thru yo phone</div>
    <div class="hint">Upload a photo showing you completed this dare.</div>
    <div class="upload">
      <div class="emoji">📷</div>
      <div class="label">Tap to add photo proof</div>
    </div>
    <div class="field">Caption (optional)</div>
    <div class="rules">Hand your phone unlocked to someone in the room for 6 minutes. They can scroll anything except banking apps.</div>
    <div class="btn">Submit proof · +20pts</div>
  </div>
</body>
</html>
