<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 390px; height: 844px; overflow: hidden;
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff; color: #0A0A0F;
  }
  .grad { background: linear-gradient(135deg, #FF6A2C 0%, #FF2D95 55%, #C01686 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .status { display:flex; justify-content:space-between; align-items:center; padding:14px 22px 0; font-size:15px; font-weight:600; }
  .island { width:118px; height:34px; background:#000; border-radius:20px; margin:10px auto 0; }
  .title { padding:18px 22px 0; font-size:34px; font-weight:800; letter-spacing:-0.02em; line-height:1; }
  .tabs { display:flex; gap:8px; padding:16px 22px 0; }
  .tab {
    padding:8px 16px; border-radius:99px; font-size:14px; font-weight:600;
    border:1px solid #E5E7EB; background:#fff; color:#6B7280;
  }
  .tab.on { border:none; color:#fff; background:linear-gradient(135deg,#FF6A2C,#FF2D95 60%,#C01686); }
  .list { padding:8px 0 0; }
  .row {
    display:flex; align-items:center; gap:12px; padding:14px 22px;
    border-bottom:1px solid #F3F4F6;
  }
  .row.me { background:#F4F3F8; }
  .row.dim { opacity:.45; }
  .rank { width:24px; font-size:15px; font-weight:700; text-align:center; color:#9CA3AF; }
  .rank.gold { color:#FF6A2C; }
  .rank.pink { color:#FF2D95; }
  .avatar {
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg,#FF2D95,#C01686);
    display:grid; place-items:center; font-size:22px;
  }
  .info { flex:1; min-width:0; }
  .name { font-size:16px; font-weight:700; line-height:1.2; }
  .handle { font-size:13px; color:#9CA3AF; margin-top:2px; }
  .pts { font-size:16px; font-weight:700; font-variant-numeric: tabular-nums; }
  .pts.gold { color:#FF6A2C; }
  .tabbar-wrap { position:absolute; left:0; right:0; bottom:24px; display:flex; justify-content:center; }
  .tabbar {
    display:flex; align-items:center; gap:6px; padding:6px; border-radius:99px;
    background:#fff; box-shadow:0 4px 24px rgba(0,0,0,.10);
  }
  .tabbtn {
    display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:99px;
    font-size:14px; font-weight:700; color:#9CA3AF;
  }
  .tabbtn.on { color:#fff; background:linear-gradient(135deg,#FF6A2C,#FF2D95 60%,#C01686); }
  .tab-icon { font-size:18px; line-height:1; }
</style>
</head>
<body>
  <div class="status"><span>9:41</span><span style="font-size:13px">●●● ▮▮▮ 🔋</span></div>
  <div class="island"></div>
  <h1 class="title grad">Leaderboard</h1>
  <div class="tabs">
    <div class="tab on">Friends</div>
    <div class="tab">Club</div>
    <div class="tab">Global</div>
  </div>
  <div class="list">
    <div class="row">
      <span class="rank gold">1</span>
      <div class="avatar">👑</div>
      <div class="info"><div class="name">Maya Quinn</div><div class="handle">@mtnmaya</div></div>
      <span class="pts gold">984pts</span>
    </div>
    <div class="row">
      <span class="rank pink">2</span>
      <div class="avatar">🦊</div>
      <div class="info"><div class="name">Devon Park</div><div class="handle">@devruns</div></div>
      <span class="pts">972pts</span>
    </div>
    <div class="row">
      <span class="rank pink">3</span>
      <div class="avatar">🐺</div>
      <div class="info"><div class="name">Asha Khan</div><div class="handle">@ashaouttacave</div></div>
      <span class="pts">970pts</span>
    </div>
    <div class="row">
      <span class="rank">4</span>
      <div class="avatar">🐸</div>
      <div class="info"><div class="name">Theo Reyes</div><div class="handle">@theogoesout</div></div>
      <span class="pts">890pts</span>
    </div>
    <div class="row">
      <span class="rank">5</span>
      <div class="avatar">🦝</div>
      <div class="info"><div class="name">Nina Park</div><div class="handle">@earlybirdnina</div></div>
      <span class="pts">690pts</span>
    </div>
    <div class="row dim">
      <span class="rank">6</span>
      <div class="avatar">🦦</div>
      <div class="info"><div class="name">Sam Liu</div><div class="handle">@samoutside</div></div>
      <span class="pts">540pts</span>
    </div>
    <div class="row me">
      <span class="rank">89</span>
      <div class="avatar">👑</div>
      <div class="info"><div class="name">You</div><div class="handle">@yourhandle</div></div>
      <span class="pts">184pts</span>
    </div>
  </div>
  <div class="tabbar-wrap">
    <div class="tabbar">
      <div class="tabbtn"><span class="tab-icon">🏠</span></div>
      <div class="tabbtn on"><span class="tab-icon">🏆</span> Board</div>
      <div class="tabbtn"><span class="tab-icon">👤</span></div>
    </div>
  </div>
</body>
</html>
