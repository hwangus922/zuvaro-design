# Zuvaro Supabase project config
# Run: cd backend/supabase && supabase start

project_id = "zuvaro"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "zuvaro://auth-callback"
additional_redirect_urls = ["zuvaro://auth-callback"]
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "10MiB"
